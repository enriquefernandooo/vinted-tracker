name: Daily Price Update

on:
  schedule:
    - cron: '0 * * * *'    # jede Stunde → Preise sammeln
    - cron: '0 7 * * *'    # 9 Uhr deutsch → Tages-VK berechnen
  workflow_dispatch:
    inputs:
      modus:
        description: 'sammeln oder tagesvk'
        required: true
        default: 'sammeln'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          MODUS="${{ github.event.inputs.modus }}"
          STUNDE=$(date -u +%H)
          if [ "$MODUS" = "tagesvk" ]; then
            python updater.py tagesvk
          elif [ "$MODUS" = "" ] && [ "$STUNDE" = "07" ]; then
            python updater.py tagesvk
          else
            python updater.py sammeln
          fi